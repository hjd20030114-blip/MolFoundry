# ============================================
# 双卡服务器优化配置（2×RTX 4090 / RTX 6000）
# 总显存：48-96GB，支持超大模型训练
# ============================================

# 数据配置
data:
  pl_data_dir: "/home/hjd/PRRSV/HJD/data/P-L"
  batch_size: 32              # 双卡：16/GPU
  num_workers: 8              # 每GPU 4个worker
  pin_memory: true

# ============================================
# 模型配置（按模型类型）
# ============================================

# 1.（已删除）PocketConditionedDiffusion 配置
# 2.（已删除）PLPairClassifier 配置

# 3. PocketLigandTransformer（交叉注意力）- 大规模Transformer
transformer:
  model_type: "pocket_ligand_transformer"
  hidden_dim: 1024            # 512→1024
  num_heads: 16               # 8→16
  num_layers: 12              # 6→12层（标准BERT规模）
  ff_dim: 4096                # 4×hidden_dim
  use_gated_ffn: true
  dropout: 0.1
  # 预估参数：~150M

# 2. EquivariantGNN（等变图神经网络）
equivariant_gnn:
  model_type: "equivariant_gnn"
  hidden_dim: 512             # 256→512
  num_layers: 6               # 4→6层
  max_radius: 12.0            # 扩大截断半径
  num_neighbors: 32
  num_radial: 128             # 100→128
  irreps_hidden: "128x0e + 64x1e + 32x2e"  # 增加高阶不可约表示
  dropout: 0.1
  # 预估参数：~80M

# ============================================
# 训练配置（优化双卡利用率）
# ============================================
training:
  epochs: 3000
  batch_size: 32              # 全局batch，双卡各16
  learning_rate: 3.0e-5       # 大模型用小LR
  weight_decay: 0.05
  gradient_clip: 1.0
  warmup_epochs: 150          # 适配长训练（约5% warmup）
  eta_min: 1.0e-7
  
  # 优化器
  optimizer_type: "adamw"
  scheduler_type: "cosine"
  
  # 混合精度（必须，节省50%显存）
  mixed_precision: true
  amp_dtype: "bfloat16"       # RTX 4090支持BF16，比FP16更稳定
  
  # 梯度累积（模拟更大batch）
  accumulation_steps: 2       # 等效batch=64
  
  # 梯度检查点（节省40%显存，训练慢15%）
  gradient_checkpointing: true
  
  # 分布式训练
  distributed: true
  world_size: 2               # 2 GPUs
  backend: "nccl"             # Linux NVIDIA最优后端

# ============================================
# 验证与保存
# ============================================
validation:
  frequency: 1                # 每epoch验证
  early_stopping_patience: 100
  metric: "val_loss"

checkpoints:
  save_frequency: 100         # 长训练降低周期性保存频率
  save_best_only: true
  keep_last_n: 3
  best_save_freq: 300         # 每300个epoch保存一次“当前最佳”快照

# ============================================
# 日志配置
# ============================================
logging:
  log_dir: "/home/hjd/PRRSV/HJD/logs/dual_gpu_run"
  tensorboard: true
  wandb: false                # 可选：Weights & Biases

# ============================================
# 硬件优化（NVIDIA特定）
# ============================================
hardware:
  cudnn_benchmark: true       # 自动优化卷积算法
  tf32: true                  # 启用TensorFloat-32（RTX 30+）
  num_threads: 16             # CPU线程数
